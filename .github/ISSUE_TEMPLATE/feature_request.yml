name: Feature request
description: Suggest a new feature or enhancement
title: "[feature] "
labels: ["enhancement", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. The maintainer is one person; not every
        idea will land, but every idea is read.

        Before opening, consider whether this fits better as a
        [Discussion](https://github.com/poli0981/telegram-scraper-bot/discussions)
        — open-ended "should we even build this?" questions belong there
        until the scope firms up.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected?
      placeholder: |
        When I paste many URLs at once, I can't tell which ones are
        invalid until /done. I'd like live feedback per paste.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
      placeholder: |
        After each paste in COLLECT, reply with "Added: 3 Steam, 1 itch,
        2 invalid" instead of just "5 line(s) buffered".
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What else did you think about? Any existing command that almost
        does this?
      placeholder: |
        /show works but requires an extra command. I'd rather it happen
        on every paste.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Where does this change live?
      options:
        - Bot core (handlers, classifier, gates)
        - Inline keyboards / UX
        - Workflows (CI / release / bump-version)
        - Documentation
        - Tracker repo workflows (free-steam-games-list / free-games-itchio-list)
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How blocking is this for you?
      options:
        - Nice to have
        - Would make my workflow much easier
        - I cannot use the bot without this
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Mockups, links to similar features in other bots, performance
        considerations, anything else.
    validations:
      required: false

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy checklist
      options:
        - label: I have NOT included any Telegram User IDs or secrets in this request.
          required: true
        - label: I have read the [Code of Conduct](https://github.com/poli0981/telegram-scraper-bot/blob/main/CODE_OF_CONDUCT.md).
          required: true

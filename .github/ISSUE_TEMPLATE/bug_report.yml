name: Bug report
description: Something is broken in the bot itself or its workflows
title: "[bug] "
labels: ["bug", "triage"]
assignees:
  - poli0981

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **Privacy reminder**: Do NOT include your Telegram User ID,
        BOT_TOKEN, GH_PAT, or any other secret in this issue. If
        the bug requires sharing your user_id, send it via DM through
        one of the channels in [`AUTHORS.md`](https://github.com/poli0981/telegram-scraper-bot/blob/main/AUTHORS.md)
        and reference the conversation here ("DM'd user_id on 2026-01-15").

        **Security issues**: do not open a bug report — use the
        [private security advisory form](https://github.com/poli0981/telegram-scraper-bot/security/advisories/new)
        instead.

  - type: input
    id: version
    attributes:
      label: Bot version
      description: |
        Output of `/version` in the bot, or the git SHA of your build.
      placeholder: "0.2.0 (sha: a267679)"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      description: How are you running the bot?
      options:
        - Docker (docker compose)
        - Docker (raw `docker run`)
        - Bare metal / systemd
        - Local dev (`python -m bot.main`)
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: |
        Describe the bug — what you observed and what you expected.
        Screenshots welcome (with user IDs and tokens redacted).
      placeholder: |
        Pasted two URLs in /q, only one was dispatched.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal sequence the maintainer can replay.
      placeholder: |
        1. /start → tap "Steam"
        2. paste `https://store.steampowered.com/app/440/`
        3. /done → tap Confirm
        4. observe failure mode
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Both URLs dispatched.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        `docker compose logs --tail=200 bot`, or the equivalent for your
        setup. **Redact tokens, user IDs, and chat IDs.**
      render: shell
    validations:
      required: false

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version` (or from `/version`).
      placeholder: "3.12.x"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Host OS
      options:
        - Linux
        - Windows
        - macOS
        - Other
    validations:
      required: false

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy checklist
      options:
        - label: I have NOT included any Telegram User IDs, BOT_TOKEN, GH_PAT, or other secrets in this report.
          required: true
        - label: I have read the [Code of Conduct](https://github.com/poli0981/telegram-scraper-bot/blob/main/CODE_OF_CONDUCT.md).
          required: true

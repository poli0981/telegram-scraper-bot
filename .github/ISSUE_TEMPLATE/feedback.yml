name: Feedback / general comment
description: Share thoughts, observations, or non-bug non-feature feedback
title: "[feedback] "
labels: ["feedback"]

body:
  - type: markdown
    attributes:
      value: |
        For freeform conversation prefer
        [Discussions](https://github.com/poli0981/telegram-scraper-bot/discussions).
        Use this template only for feedback you want tracked as an issue —
        for example, "this UX confused me", "documentation gap", "I tried
        this and it almost worked".

        For bugs, use the bug report template instead.
        For features, use the feature request template instead.

  - type: dropdown
    id: kind
    attributes:
      label: Kind of feedback
      options:
        - Documentation gap or unclear instruction
        - UX confusion (something works but is hard to find / understand)
        - Performance observation
        - Operational / deployment friction
        - Praise (it's fine to say nice things)
        - Other
    validations:
      required: true

  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: Tell us what's on your mind.
      placeholder: |
        I couldn't figure out how to share my user_id with the operator
        — the README mentions ALLOWED_USER_IDS but doesn't say how to
        find your own ID. Maybe link /whoami in the README intro?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Bot version (optional)
      placeholder: "0.2.0"
    validations:
      required: false

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy checklist
      options:
        - label: I have NOT included any Telegram User IDs or secrets in this feedback.
          required: true
        - label: I have read the [Code of Conduct](https://github.com/poli0981/telegram-scraper-bot/blob/main/CODE_OF_CONDUCT.md).
          required: true
